<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ushuaia Shipping — Business card design options</title>
<style>
  :root {
    --green-deep: #002A22;
    --green-soft: #173E28;
    --lime: #A4C733;
    --paper: #F5F5F1;
    --paper-warm: #EFEEE9;
    --ink: #002A22;
    --muted: #A9A69B;
    --line: rgba(0, 42, 34, 0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, Avenir, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg, var(--green-deep) 0 310px, var(--paper) 310px 100%);
    color: var(--ink);
    padding: 56px;
  }

  .page { max-width: 1180px; margin: 0 auto; }

  header {
    min-height: 210px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 34px;
    color: var(--paper);
  }

  h1 {
    font-size: clamp(28px, 4.4vw, 56px);
    line-height: 0.96;
    letter-spacing: -0.045em;
    font-weight: 650;
    max-width: 680px;
  }

  .header-note {
    max-width: 300px;
    font-size: 12px;
    line-height: 1.55;
    color: rgba(245,245,241,0.72);
    text-align: right;
    letter-spacing: 0.02em;
  }

  .intro-strip {
    background: var(--paper-warm);
    border: 1px solid rgba(0,42,34,0.08);
    border-radius: 18px;
    padding: 18px 22px;
    margin: 0 0 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    box-shadow: 0 18px 50px rgba(0, 42, 34, 0.10);
  }

  .intro-strip p {
    font-size: 12px;
    line-height: 1.5;
    color: rgba(0,42,34,0.70);
  }

  .intro-strip strong { color: var(--ink); font-weight: 650; }

  .swatches { display: flex; gap: 8px; flex-shrink: 0; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); }
  .s1 { background: var(--green-deep); }
  .s2 { background: var(--lime); }
  .s3 { background: var(--paper); }
  .s4 { background: var(--paper-warm); }

  .option-block {
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(0,42,34,0.10);
    border-radius: 22px;
    padding: 26px;
    margin-bottom: 28px;
    box-shadow: 0 16px 48px rgba(0, 42, 34, 0.08);
  }

  .option-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 16px;
  }

  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--lime);
    font-weight: 700;
  }

  .option-note {
    font-size: 12px;
    color: rgba(0,42,34,0.56);
    text-align: right;
  }

  .card-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: start;
  }

  .card-wrap { display: flex; flex-direction: column; gap: 8px; }

  figcaption {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: rgba(0,42,34,0.42);
    font-weight: 600;
  }

  .card-wrap img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
    box-shadow: 0 18px 42px rgba(0, 30, 24, 0.18), 0 2px 8px rgba(0, 30, 24, 0.10);
    border: 1px solid rgba(0, 42, 34, 0.08);
    background: white;
  }



  footer {


    margin-top: 36px;
    padding: 20px 0 0;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(0,42,34,0.42);
    border-top: 1px solid rgba(0,42,34,0.10);
  }

  @media (max-width: 860px) {
    body { padding: 28px 18px; background: linear-gradient(180deg, var(--green-deep) 0 250px, var(--paper) 250px 100%); }
    header { min-height: 170px; display: block; }
    .header-note { text-align: left; margin-top: 18px; }
    .intro-strip { align-items: flex-start; flex-direction: column; }
    .card-pair, .mockup-row { grid-template-columns: 1fr; }
  }

  @media print {
    body { background: var(--paper); padding: 20px; }
    header { color: var(--ink); min-height: auto; padding-bottom: 24px; }
    .header-note { color: rgba(0,42,34,0.62); }
    .option-block, .intro-strip, .mockup-section { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
